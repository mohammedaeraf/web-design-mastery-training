```html
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Hero Section Example</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <style>
        /* Hero Section Styling */
        .hero-section {

            /* Dark overlay + background image */
            background:
                linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                url('https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=1400&auto=format&fit=crop');

            /* Make image cover full area */
            background-size: cover;

            /* Center image */
            background-position: center;

            /* Full screen height */
            min-height: 100vh;

            /* White text */
            color: white;

            /* Center content vertically */
            display: flex;
            align-items: center;
        }
    </style>
</head>

<body>

    <!-- Hero Section -->
    <section class="hero-section">

        <div class="container">

            <div class="row">

                <div class="col-lg-7">

                    <h1 class="display-3 fw-bold">
                        Learn Web Design & Development
                    </h1>

                    <p class="lead mt-4">
                        Build modern and responsive websites using HTML,
                        CSS, Bootstrap and JavaScript.
                    </p>

                    <button class="btn btn-primary btn-lg mt-3">
                        Join Course
                    </button>

                </div>

            </div>

        </div>

    </section>

</body>

</html>
